<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="90" fill="#1C1208"/>

  <!-- Decorative rule lines (top) -->
  <line x1="80" y1="108" x2="196" y2="108" stroke="#C9A84C" stroke-width="2" opacity="0.5"/>
  <rect x="252" y="102" width="8" height="8" fill="#C9A84C" transform="rotate(45 256 106)" opacity="0.7"/>
  <line x1="316" y1="108" x2="432" y2="108" stroke="#C9A84C" stroke-width="2" opacity="0.5"/>

  <!-- Wine glass bowl -->
  <path d="M 174 148
           C 174 148 152 238 176 285
           C 196 323 224 336 256 336
           C 288 336 316 323 336 285
           C 360 238 338 148 338 148 Z"
        fill="#3D0A14" stroke="#C9A84C" stroke-width="9" stroke-linejoin="round"/>

  <!-- Wine fill inside bowl -->
  <path d="M 188 230
           C 194 262 218 300 256 300
           C 294 300 318 262 324 230
           C 308 218 280 212 256 212
           C 232 212 204 218 188 230 Z"
        fill="#6B1A2A"/>

  <!-- Wine surface highlight -->
  <ellipse cx="256" cy="228" rx="68" ry="14" fill="#9B3A4A" opacity="0.6"/>

  <!-- Glass stem -->
  <rect x="247" y="336" width="18" height="96" rx="4" fill="#C9A84C"/>

  <!-- Glass base -->
  <rect x="176" y="428" width="160" height="18" rx="8" fill="#C9A84C"/>

  <!-- Glass shine -->
  <path d="M 186 168 C 182 192 180 224 184 252"
        stroke="rgba(255,255,255,0.15)" stroke-width="10"
        fill="none" stroke-linecap="round"/>

  <!-- Decorative rule lines (bottom) -->
  <line x1="80" y1="404" x2="432" y2="404" stroke="#C9A84C" stroke-width="1" opacity="0.2"/>
</svg>
