window.seed = async function() {
  const btn = document.getElementById('btn');
  const log = document.getElementById('log');
  btn.disabled = true;
  log.innerHTML = '';

  const entries = Object.entries(inventory);
  let ok = 0, fail = 0;

  for (const [id, data] of entries) {
    try {
      await setDoc(doc(db, 'cellar', id), data);
      log.innerHTML += `<span class="ok">✓ ${id} — ${data.name}</span>\n`;
      ok++;
    } catch (e) {
      log.innerHTML += `<span class="err">✗ ${id}: ${e.message}</span>\n`;
      fail++;
    }
  }

  log.innerHTML += `\n<span class="done">${ok} documents written${fail ? `, ${fail} failed` : ''}. Firestore is ready.</span>`;
  btn.disabled = false;
};
