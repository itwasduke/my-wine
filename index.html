<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Cellar</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0F2010">

<!-- iOS home screen -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="The Cellar">
<link rel="apple-touch-icon" href="icon.svg">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <div id="auth-area">
    <button class="auth-btn" id="signInBtn">Sign In</button>
    <div class="auth-user" id="userInfo" style="display:none">
      <div class="auth-initial" id="userInitial"></div>
      <button class="auth-signout" id="signOutBtn">Sign Out</button>
    </div>
  </div>
  <div class="header-rule">
    <div class="rule-line"></div>
    <div class="rule-diamond"></div>
    <div class="rule-line"></div>
  </div>
  <h1>The Cellar</h1>
  <p class="subtitle">A personal inventory</p>
  <p class="last-updated">Last updated: April 13, 2026</p>
</header>

<div style="max-width:1400px;margin:0 auto;padding:0 40px;">
  <div class="filter-bar" id="filterBar" data-filter="all">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn"        data-filter="wine">Wine</button>
    <button class="filter-btn"        data-filter="spirits">Spirits</button>
  </div>
</div>

<main id="main-content">
  <div id="cellar-loading" style="text-align:center;padding:80px 20px;font-size:1rem;color:var(--text-secondary);letter-spacing:0.1em;">
    Loading cellar…
  </div>
</main>

<footer>
  <p class="footer-text">The Cellar &nbsp;·&nbsp; Personal Inventory &nbsp;·&nbsp; v1.4.0</p>
</footer>

<!-- Camera / photo file input (hidden) -->
<input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">

<!-- Floating add button — hidden until signed in -->
<button class="fab" id="fab" aria-label="Add a bottle" style="display:none">+</button>

<!-- Scan / Add Bottle Modal -->
<div class="scan-overlay" id="scanOverlay">
  <div class="scan-modal">
    <button class="modal-close" id="closeScanBtn">×</button>
    <div class="scan-modal-title">Add to Cellar</div>
    <img id="scanPreview" class="scan-preview" src="" alt="Label preview" style="display:none">
    <div class="scan-status" id="scanStatus">
      <div class="scan-spinner" id="scanSpinner"></div>
      <span id="scanStatusText">Reading label with Gemini…</span>
    </div>

    <!-- The form is hidden until AI extraction is done -->
    <div class="add-form" id="addForm">
      <div class="form-row">
        <label class="form-label">Bottle Name</label>
        <input type="text" id="f-name" class="form-input" placeholder="Producer / Vineyard / Name">
      </div>
      <div class="form-row-2">
        <div>
          <label class="form-label">Vintage / Age</label>
          <input type="text" id="f-year" class="form-input" placeholder="e.g. 2018 or 12yr">
        </div>
        <div>
          <label class="form-label">ABV</label>
          <input type="text" id="f-abv" class="form-input" placeholder="e.g. 13.5%">
        </div>
      </div>
      <div class="form-row">
        <label class="form-label">Region / Appellation</label>
        <input type="text" id="f-region" class="form-input" placeholder="e.g. Napa Valley, CA">
      </div>
      <div class="form-row">
        <label class="form-label">Grape / Style</label>
        <input type="text" id="f-grape" class="form-input" placeholder="e.g. Cabernet Sauvignon">
      </div>

      <div class="form-divider"></div>

      <div class="form-row-2">
        <div>
          <label class="form-label">Type</label>
          <select id="f-type" class="form-input">
            <option value="wine">Wine</option>
            <option value="spirit">Spirit</option>
          </select>
        </div>
        <div>
          <label class="form-label">Serve Temp</label>
          <input type="text" id="f-temp" class="form-input" placeholder="e.g. 60–65°F">
        </div>
      </div>
      <div class="form-row">
        <label class="form-label">Expert Notes</label>
        <textarea id="f-notes" class="form-textarea"></textarea>
      </div>
      <div class="form-row-2">
        <div>
          <label class="form-label">Decanting</label>
          <input type="text" id="f-decant" class="form-input" placeholder="e.g. 1 hour">
        </div>
        <div>
          <label class="form-label">Drinking Window</label>
          <input type="text" id="f-window" class="form-input" placeholder="e.g. 2025–2030">
        </div>
      </div>

      <div class="form-actions">
        <button class="btn-cancel" id="cancelScanBtn">Cancel</button>
        <button class="btn-add" id="addBtn">Add to Cellar</button>
      </div>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" id="closeModalBtn">×</button>
    <div id="modalContent"></div>
  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
