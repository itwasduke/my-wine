<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Cellar</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --wine: #6B1A2A;
  --wine-dark: #3D0A14;
  --wine-light: #9B3A4A;
  --gold: #C9A84C;
  --gold-light: #E8D5A3;
  --cream: #F5EFE0;
  --parchment: #EDE3CC;
  --ink: #1C1208;
  --ash: #8C7B6B;
  --spirit-amber: #B5651D;
  --spirit-gold: #DAA520;
  --cook: #6B6B6B;
  --soon: #8B5E3C;
  --consumed: #4A5568;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background-color: var(--ink);
  color: var(--cream);
  font-family: 'Raleway', sans-serif;
  font-weight: 300;
  min-height: 100vh;
  overflow-x: hidden;
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(107,26,42,0.15) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(201,168,76,0.08) 0%, transparent 50%);
}
header { text-align: center; padding: 60px 20px 40px; position: relative; }
.header-rule { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 20px; }
.rule-line { flex: 1; max-width: 200px; height: 1px; background: linear-gradient(to right, transparent, var(--gold), transparent); }
.rule-diamond { width: 8px; height: 8px; background: var(--gold); transform: rotate(45deg); }
h1 { font-family: 'Cinzel', serif; font-size: clamp(2.5rem, 6vw, 4.5rem); font-weight: 600; letter-spacing: 0.15em; background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 10px; }
.subtitle { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.1rem; color: var(--ash); letter-spacing: 0.3em; text-transform: uppercase; }
.last-updated { font-size: 0.72rem; color: rgba(140,123,107,0.5); letter-spacing: 0.15em; margin-top: 8px; }
main { max-width: 1400px; margin: 0 auto; padding: 20px 40px 80px; }
.section { margin-bottom: 60px; }
.section-header { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; }
.section-title { font-family: 'Cinzel', serif; font-size: 1.1rem; letter-spacing: 0.25em; text-transform: uppercase; white-space: nowrap; }
.section-title.ready { color: var(--wine-light); }
.section-title.soon { color: var(--soon); }
.section-title.cook { color: var(--cook); }
.section-title.spirits { color: var(--spirit-gold); }
.section-title.consumed { color: var(--consumed); }
.section-line { flex: 1; height: 1px; }
.section-line.ready { background: linear-gradient(to right, var(--wine-light), transparent); }
.section-line.soon { background: linear-gradient(to right, var(--soon), transparent); }
.section-line.cook { background: linear-gradient(to right, var(--cook), transparent); }
.section-line.spirits { background: linear-gradient(to right, var(--spirit-gold), transparent); }
.section-line.consumed { background: linear-gradient(to right, var(--consumed), transparent); }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
.card {
  background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 100%);
  border: 1px solid rgba(201,168,76,0.12);
  border-radius: 2px;
  padding: 24px 22px;
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px; height: 100%;
  transition: opacity 0.3s;
}
.card.ready::before { background: var(--wine-light); }
.card.soon::before { background: var(--soon); }
.card.cook::before { background: var(--cook); }
.card.spirits::before { background: var(--spirit-gold); }
.card.consumed::before { background: var(--consumed); }
.card.consumed { opacity: 0.65; }
.card:hover { transform: translateY(-3px); border-color: rgba(201,168,76,0.3); background: linear-gradient(135deg, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0.02) 100%); }
.card-year { font-family: 'Cinzel', serif; font-size: 0.75rem; letter-spacing: 0.2em; margin-bottom: 8px; }
.card.ready .card-year { color: var(--wine-light); }
.card.soon .card-year { color: var(--soon); }
.card.cook .card-year { color: var(--cook); }
.card.spirits .card-year { color: var(--spirit-gold); }
.card.consumed .card-year { color: var(--consumed); }
.card-name { font-family: 'Cormorant Garamond', serif; font-size: 1.25rem; font-weight: 400; color: var(--cream); margin-bottom: 6px; line-height: 1.3; }
.card-region { font-size: 0.78rem; color: var(--ash); letter-spacing: 0.1em; }
.card-badge {
  display: inline-block;
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 2px 8px;
  border-radius: 1px;
  margin-top: 10px;
}
.badge-3l { background: rgba(107,26,42,0.4); color: var(--wine-light); border: 1px solid rgba(155,58,74,0.3); }
.badge-japan { background: rgba(181,101,29,0.2); color: var(--spirit-gold); border: 1px solid rgba(218,165,32,0.3); }
.badge-limited { background: rgba(201,168,76,0.15); color: var(--gold); border: 1px solid rgba(201,168,76,0.3); }

/* Modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(10,6,2,0.88);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backdrop-filter: blur(4px);
}
.modal-overlay.active { display: flex; }
.modal {
  background: linear-gradient(145deg, #1f1208, #160e05);
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: 2px;
  max-width: 560px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  padding: 40px;
  position: relative;
}
.modal-close {
  position: absolute;
  top: 16px; right: 20px;
  background: none;
  border: none;
  color: var(--ash);
  font-size: 1.5rem;
  cursor: pointer;
  line-height: 1;
  transition: color 0.2s;
}
.modal-close:hover { color: var(--gold); }
.modal-year { font-family: 'Cinzel', serif; font-size: 0.8rem; letter-spacing: 0.25em; margin-bottom: 10px; }
.modal-name { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 400; color: var(--cream); margin-bottom: 4px; line-height: 1.2; }
.modal-region { font-size: 0.82rem; color: var(--ash); letter-spacing: 0.12em; margin-bottom: 24px; }
.modal-divider { height: 1px; background: linear-gradient(to right, rgba(201,168,76,0.3), transparent); margin-bottom: 24px; }
.modal-section-label { font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--ash); margin-bottom: 8px; }
.modal-text { font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; color: var(--gold-light); line-height: 1.7; margin-bottom: 20px; font-weight: 300; }
.modal-meta { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; }
.meta-item { display: flex; flex-direction: column; gap: 4px; }
.meta-label { font-size: 0.65rem; letter-spacing: 0.2em; color: var(--ash); text-transform: uppercase; }
.meta-value { font-family: 'Cormorant Garamond', serif; font-size: 1rem; color: var(--cream); }
.modal-status {
  display: inline-block;
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 4px 12px;
  border-radius: 1px;
  margin-bottom: 20px;
}
.status-ready { background: rgba(107,26,42,0.4); color: var(--wine-light); border: 1px solid rgba(155,58,74,0.3); }
.status-soon { background: rgba(139,94,60,0.3); color: #C4895A; border: 1px solid rgba(139,94,60,0.4); }
.status-cook { background: rgba(107,107,107,0.2); color: var(--cook); border: 1px solid rgba(107,107,107,0.3); }
.status-spirits { background: rgba(181,101,29,0.2); color: var(--spirit-gold); border: 1px solid rgba(218,165,32,0.3); }
.status-consumed { background: rgba(74,85,104,0.2); color: #A0AEC0; border: 1px solid rgba(74,85,104,0.4); }
.badge-consumed { background: rgba(74,85,104,0.2); color: #A0AEC0; border: 1px solid rgba(74,85,104,0.3); }
.consume-btn {
  display: block;
  width: 100%;
  margin-top: 20px;
  padding: 12px;
  background: rgba(107,26,42,0.25);
  border: 1px solid rgba(155,58,74,0.4);
  border-radius: 2px;
  color: var(--wine-light);
  font-family: 'Cinzel', serif;
  font-size: 0.75rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s ease;
}
.consume-btn:hover {
  background: rgba(107,26,42,0.45);
  border-color: rgba(155,58,74,0.7);
  color: var(--cream);
}

footer { text-align: center; padding: 40px 20px; border-top: 1px solid rgba(201,168,76,0.08); }
.footer-text { font-size: 0.75rem; color: rgba(140,123,107,0.5); letter-spacing: 0.15em; }

@media (max-width: 600px) {
  main { padding: 20px 20px 60px; }
  .modal { padding: 30px 24px; }
}
</style>
</head>
<body>

<header>
  <div class="header-rule">
    <div class="rule-line"></div>
    <div class="rule-diamond"></div>
    <div class="rule-line"></div>
  </div>
  <h1>The Cellar</h1>
  <p class="subtitle">A personal inventory</p>
  <p class="last-updated">Last updated: April 6, 2026</p>
</header>

<main id="main-content">
  <div id="cellar-loading" style="text-align:center;padding:80px 20px;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.1rem;color:var(--ash);letter-spacing:0.15em;">
    Loading cellar…
  </div>
</main>

<footer>
  <p class="footer-text">The Cellar &nbsp;·&nbsp; Personal Inventory</p>
</footer>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModalDirect()">×</button>
    <div id="modalContent"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc }
  from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDSI59xpcHzwk6mwHA9ocQZePfjoGpholw",
  authDomain: "my-wine-616a8.firebaseapp.com",
  projectId: "my-wine-616a8",
  storageBucket: "my-wine-616a8.firebasestorage.app",
  messagingSenderId: "393703017848",
  appId: "1:393703017848:web:eefd98ed3e0c49f811cc8d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// In-memory cache of all inventory documents (id -> data)
let inventory = {};

const SECTIONS = [
  { status: 'ready',    label: 'Ready to Drink',          cls: 'ready' },
  { status: 'soon',     label: 'Drink Soon',               cls: 'soon' },
  { status: 'cook',     label: 'Past Peak — Cooking Only', cls: 'cook' },
  { status: 'spirits',  label: 'Spirits',                  cls: 'spirits' },
  { status: 'consumed', label: 'Consumed',                 cls: 'consumed' },
];

async function loadInventory() {
  try {
    const snapshot = await getDocs(collection(db, 'cellar'));
    inventory = {};
    snapshot.forEach(d => { inventory[d.id] = { id: d.id, ...d.data() }; });
    renderInventory();
  } catch (e) {
    document.getElementById('cellar-loading').textContent =
      'Could not load cellar. Check your connection and Firestore rules.';
    console.error(e);
  }
}

function renderInventory() {
  const main = document.getElementById('main-content');

  // Group by status
  const byStatus = {};
  Object.values(inventory).forEach(w => {
    if (!byStatus[w.status]) byStatus[w.status] = [];
    byStatus[w.status].push(w);
  });

  main.innerHTML = SECTIONS
    .filter(sec => byStatus[sec.status]?.length)
    .map(sec => `
      <div class="section">
        <div class="section-header">
          <span class="section-title ${sec.cls}">${sec.label}</span>
          <div class="section-line ${sec.cls}"></div>
        </div>
        <div class="grid">
          ${byStatus[sec.status].map(cardHTML).join('')}
        </div>
      </div>
    `).join('');
}

function cardHTML(w) {
  const badge = w.status === 'consumed'
    ? `<span class="card-badge badge-consumed">Consumed</span>`
    : (w.badge ? `<span class="card-badge ${w.badgeClass || ''}">${w.badge}</span>` : '');
  return `
    <div class="card ${w.status}" onclick="openModal('${w.id}')">
      <div class="card-year">${w.year}</div>
      <div class="card-name">${w.name}</div>
      <div class="card-region">${w.region}</div>
      ${badge}
    </div>
  `;
}

window.openModal = function(id) {
  const w = inventory[id];
  if (!w) return;
  const showBtn = w.status !== 'consumed' && w.status !== 'cook' && w.status !== 'spirits';
  document.getElementById('modalContent').innerHTML = `
    <div class="modal-year">${w.year}</div>
    <div class="modal-name">${w.name}</div>
    <div class="modal-region">${w.region}</div>
    <span class="modal-status status-${w.status}">${w.statusLabel}</span>
    <div class="modal-divider"></div>
    <div class="modal-meta">
      <div class="meta-item"><span class="meta-label">Variety</span><span class="meta-value">${w.grape}</span></div>
      <div class="meta-item"><span class="meta-label">ABV</span><span class="meta-value">${w.abv}</span></div>
      <div class="meta-item"><span class="meta-label">Serve</span><span class="meta-value">${w.temp}</span></div>
    </div>
    <div class="modal-section-label">Tasting Notes</div>
    <div class="modal-text">${w.notes}</div>
    <div class="modal-section-label">Decanting</div>
    <div class="modal-text">${w.decant}</div>
    <div class="modal-section-label">Drinking Window</div>
    <div class="modal-text">${w.window}</div>
    ${showBtn ? `<div class="modal-divider" style="margin-top:24px"></div>
      <button class="consume-btn" onclick="markConsumed('${id}')">Mark as Consumed</button>` : ''}
  `;
  document.getElementById('modalOverlay').classList.add('active');
};

window.markConsumed = async function(id) {
  const btn = document.querySelector('.consume-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }
  try {
    await updateDoc(doc(db, 'cellar', id), { status: 'consumed', statusLabel: 'Consumed' });
    inventory[id].status = 'consumed';
    inventory[id].statusLabel = 'Consumed';
    closeModalDirect();
    renderInventory();
  } catch (e) {
    if (btn) { btn.disabled = false; btn.textContent = 'Mark as Consumed'; }
    console.error('Failed to update Firestore:', e);
  }
};

window.closeModal = function(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
};

function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('active');
}
window.closeModalDirect = closeModalDirect;

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalDirect(); });

loadInventory();
</script>
</body>
</html>
